name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install uv 
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Install deps
        run: uv sync --locked
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format (black)
        run: uv run black --check .
      - name: Unit tests
        run: |
          uv run pytest -q --cov=src --cov-report=xml
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  build-push:
    needs: lint-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/serve/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/api:latest
      - name: Build & push ETL image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/etl/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/etl:latest

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init
      - name: Terraform Apply (auto-approve)
        working-directory: infra/terraform
        env:
          TF_VAR_image_api: ghcr.io/${{ github.repository }}/api:latest
          TF_VAR_image_etl: ghcr.io/${{ github.repository }}/etl:latest
        run: terraform apply -auto-approve
